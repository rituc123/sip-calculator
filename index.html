<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart SIP Calculator India</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Smart SIP Calculator</h1>

  <input type="number" id="amount" placeholder="Monthly Investment">

  <input type="number" id="rate" placeholder="Annual Interest Rate">

  <input type="number" id="years" placeholder="Years">

  <button onclick="calculateSIP()">Calculate</button>

  <div class="results">
  <p>Total Invested</p>
  <h3 id="invested">₹0</h3>

  <p>Estimated Returns</p>
  <h3 id="returns">₹0</h3>

  <p>Total Value</p>
  <h2 id="result">₹0</h2>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
